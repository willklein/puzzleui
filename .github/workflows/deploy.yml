name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; let in-flight runs finish rather than
# racing an old build against a newer one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck and build
        run: pnpm run build

      - name: Build Storybook
        # Outputs straight into dist/storybook (see the build-storybook script),
        # so it ships as part of the same Pages artifact, at /storybook.
        run: pnpm run build-storybook

      - name: Add SPA fallback for GitHub Pages
        # GitHub Pages has no server-side rewrites. It does serve 404.html for
        # any unmatched path, and our routing only reads location.pathname on
        # load, so a copy of index.html lets direct links (e.g. /blue-prince)
        # resolve correctly.
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
